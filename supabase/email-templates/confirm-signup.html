<!--
  Template do e-mail de confirmação de cadastro — tema Ember (âmbar & fogo) do FichaFit.
  Colar em: Supabase Dashboard > Authentication > Email Templates > Confirm signup.
  Variável usada pelo Supabase: {{ .ConfirmationURL }}
-->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#121010;padding:40px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:420px;background-color:#1d1916;border:1px solid #2e2925;border-radius:16px;overflow:hidden;">
        <tr>
          <td style="background-image:linear-gradient(135deg,#fb923c 0%,#f59e0b 100%);padding:28px 32px;text-align:center;">
            <span style="font-size:22px;font-weight:800;color:#121010;letter-spacing:-0.02em;">FichaFit</span>
          </td>
        </tr>
        <tr>
          <td style="padding:32px 32px 8px;">
            <p style="margin:0 0 16px;color:#f5f0ea;font-size:20px;font-weight:700;">
              Bem-vindo ao FichaFit
            </p>
            <p style="margin:0 0 24px;color:#a39b92;font-size:15px;line-height:1.6;">
              Confirme seu cadastro para começar a montar suas fichas de treino. Esse link expira em 1 hora e só funciona uma vez.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px 32px;text-align:center;">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;width:100%;box-sizing:border-box;background-image:linear-gradient(135deg,#fb923c 0%,#f59e0b 100%);color:#121010;font-size:16px;font-weight:700;text-decoration:none;padding:16px 24px;border-radius:12px;">
              Confirmar cadastro
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px 32px;">
            <p style="margin:0;color:#a39b92;font-size:13px;line-height:1.6;">
              Não foi você quem pediu esse cadastro? Pode ignorar este e-mail com segurança.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 32px;border-top:1px solid #2e2925;text-align:center;">
            <p style="margin:0;color:#6f665c;font-size:12px;">
              FichaFit — sua ficha de treino, sempre com você.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
